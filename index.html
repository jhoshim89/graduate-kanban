<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban Sync</title>
  <!-- SEO & Meta Tags -->
  <meta name="description" content="대학원생들의 연구 과제, 할 일(태스크) 목록을 시각적으로 일목요연하게 관리하고 마감일(Due Date)을 직관적으로 트래킹할 수 있는 프리미엄 대형 칸반 보드 및 캘린더">
  <meta name="theme-color" content="#0070f3">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230070f3'/%3E%3Crect x='12' y='14' width='12' height='36' rx='3' fill='white' fill-opacity='.95'/%3E%3Crect x='28' y='14' width='12' height='26' rx='3' fill='%2310b981'/%3E%3Crect x='44' y='14' width='8' height='18' rx='3' fill='white' fill-opacity='.75'/%3E%3C/svg%3E">
  <link rel="shortcut icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230070f3'/%3E%3Crect x='12' y='14' width='12' height='36' rx='3' fill='white' fill-opacity='.95'/%3E%3Crect x='28' y='14' width='12' height='26' rx='3' fill='%2310b981'/%3E%3Crect x='44' y='14' width='8' height='18' rx='3' fill='white' fill-opacity='.75'/%3E%3C/svg%3E">
  
  <!-- Font Load (Inter from Google Fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Local Stylesheets -->
  <link rel="stylesheet" href="/src/styles/main.css">
  <link rel="stylesheet" href="/src/styles/components.css">
</head>
<body class="bg-canvas text-ink antialiased">

  <div class="app-container flex flex-col min-h-screen">
    <!-- Premium Vercel-Style App Header -->
    <header class="app-header sticky top-0 z-50 flex items-center justify-between border-b border-border bg-canvas px-6 md:px-12 h-16">
      <div class="flex items-center space-x-3">
        <span class="text-xl">🎓</span>
        <h1 class="text-lg font-semibold tracking-tight text-ink m-0">GRADUATE TASKS</h1>
      </div>
      
      <!-- View Switches & Add Button -->
      <div class="flex items-center space-x-4">
        <!-- View Toggle Segmented Control -->
        <div class="view-toggle-container flex p-0.5 bg-canvas-deep border border-border rounded-md">
          <button id="btn-board-view" class="view-tab-btn active px-3.5 py-1.5 text-xs font-medium rounded-sm flex items-center space-x-1.5 transition-all" aria-label="보드로 전환">
            <i data-lucide="layout-grid" class="w-3.5 h-3.5 text-accent"></i>
            <span>보드</span>
          </button>
          <button id="btn-calendar-view" class="view-tab-btn px-3.5 py-1.5 text-xs font-medium rounded-sm flex items-center space-x-1.5 transition-all" aria-label="달력 뷰로 전환">
            <i data-lucide="calendar" class="w-3.5 h-3.5"></i>
            <span>달력 뷰</span>
          </button>
          <button id="btn-dashboard-view" class="view-tab-btn px-3.5 py-1.5 text-xs font-medium rounded-sm flex items-center space-x-1.5 transition-all" aria-label="대시보드로 전환">
            <i data-lucide="layout-dashboard" class="w-3.5 h-3.5"></i>
            <span>대시보드</span>
          </button>
        </div>

        <!-- Add Task Button -->
        <button id="btn-add-task" class="btn-primary px-4 py-2 text-xs font-medium rounded-md flex items-center space-x-1.5 transition-all" aria-label="새로운 할 일 추가">
          <i data-lucide="plus" class="w-3.5 height-3.5"></i>
          <span>새 할 일 추가</span>
        </button>

        <!-- Backup: Export / Import -->
        <button id="btn-export-data" class="px-3 py-2 text-xs font-medium rounded-md flex items-center space-x-1.5 border border-border bg-canvas-deep transition-all" aria-label="데이터 내보내기" title="현재 할 일을 백업 파일로 저장">
          <i data-lucide="download" class="w-3.5 h-3.5"></i>
          <span>내보내기</span>
        </button>
        <button id="btn-import-data" class="px-3 py-2 text-xs font-medium rounded-md flex items-center space-x-1.5 border border-border bg-canvas-deep transition-all" aria-label="데이터 불러오기" title="백업 파일에서 할 일 가져오기">
          <i data-lucide="upload" class="w-3.5 h-3.5"></i>
          <span>불러오기</span>
        </button>
        <button id="btn-theme-toggle" class="theme-toggle-btn px-3 py-2 text-xs font-medium rounded-md flex items-center space-x-1.5 border border-border bg-canvas-deep transition-all" aria-label="다크 모드 전환" title="다크 모드 전환">
          <i data-lucide="moon" class="w-3.5 h-3.5"></i>
          <span>다크</span>
        </button>
        <button id="btn-migrate-sync" class="sync-migrate-btn" aria-label="동기화판으로 옮기기" title="이 브라우저의 할 일을 Google 동기화판으로 옮기기" hidden>
          <i data-lucide="send" class="w-3.5 h-3.5"></i>
          <span>동기화판으로 옮기기</span>
        </button>
        <button id="btn-sync-now" class="sync-status-pill" aria-label="동기화 새로고침" title="동기화 새로고침">
          <i id="sync-status-icon" data-lucide="hard-drive" class="w-3.5 h-3.5"></i>
          <span id="sync-status-text">이 브라우저</span>
        </button>
        <input id="import-file-input" type="file" accept="application/json,.json" class="hidden" style="display:none" />
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 bg-canvas p-6 md:p-12 overflow-x-hidden">
      <div id="app-content" class="h-full">
        <!-- Dynamic Content (Board or Calendar) will render here -->
      </div>
    </main>

    <!-- Vercel-Style Flat Footer -->
    <footer class="app-footer border-t border-border py-6 px-12 bg-canvas-soft flex items-center justify-between text-xs text-mute font-mono">
      <div>GRADUATE KANBAN BOARD &bull; MVP</div>
      <div>키보드 단축키 <kbd class="px-1.5 py-0.5 bg-canvas border border-border rounded font-sans text-[10px]">?</kbd> 누르기</div>
    </footer>
  </div>

  <!-- Modal Target Container -->
  <div id="modal-container" class="modal-root z-50"></div>

  <!-- App Core JavaScript -->
  <script type="module" src="/src/main.js"></script>
  <script>
    (() => {
      const syncUrl = "https://script.google.com/macros/s/AKfycbwcB7-zS24yffC5SbHnok1oHDZdNQncm5Z60d5YqB-jvnleBoCOCODgMlxDJMjocO_Cmw/exec";
      const btn = document.getElementById("btn-migrate-sync");
      const hasAppsScript = Boolean(window.google && window.google.script && window.google.script.run);
      if (!btn || hasAppsScript || btn.dataset.migrationBound) return;

      const readJson = (key, fallback) => {
        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : fallback;
        } catch (error) {
          return fallback;
        }
      };
      const encode = (data) => {
        const bytes = new TextEncoder().encode(JSON.stringify(data));
        let binary = "";
        bytes.forEach((byte) => { binary += String.fromCharCode(byte); });
        return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
      };

      Object.assign(btn.style, {
        display: "inline-flex",
        alignItems: "center",
        gap: "6px",
        height: "34px",
        padding: "0 12px",
        border: "1px solid #0070f3",
        borderRadius: "6px",
        background: "#0070f3",
        color: "#fff",
        fontSize: "12px",
        fontWeight: "600",
        cursor: "pointer"
      });
      btn.hidden = false;
      btn.dataset.migrationBound = "1";
      btn.addEventListener("click", () => {
        const snapshot = {
          _app: "graduate-kanban",
          _version: 4,
          tasks: readJson("graduate_kanban_tasks_v2", []),
          categories: readJson("graduate_kanban_categories_v2", []),
          activeCategory: localStorage.getItem("graduate_kanban_active_category_v2") || "__all__",
          memo: localStorage.getItem("graduate_kanban_memo_v2") || "",
          currentView: localStorage.getItem("graduate_kanban_view_v2") || "board"
        };
        const count = Array.isArray(snapshot.tasks) ? snapshot.tasks.length : 0;
        if (!window.confirm(`이 브라우저에 있는 할 일 ${count}개와 메모를 Google 동기화판으로 옮길까요?`)) return;
        window.location.href = `${syncUrl}#import=${encode(snapshot)}`;
      });
    })();
  </script>
</body>
</html>
