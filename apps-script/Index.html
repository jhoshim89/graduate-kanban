  <base target="_top">
</head>
<body class="bg-canvas text-ink antialiased">

  <div class="app-container flex flex-col min-h-screen">
    <!-- Premium Vercel-Style App Header -->
    <header class="app-header sticky top-0 z-50 flex items-center justify-between border-b border-border bg-canvas px-6 md:px-12 h-16">
      <div class="flex items-center space-x-3">
        <span class="text-xl">🎓</span>
        <h1 class="text-lg font-semibold tracking-tight text-ink m-0">GRADUATE TASKS</h1>
      </div>
      
      <!-- View Switches & Add Button -->
      <div class="flex items-center space-x-4">
        <!-- View Toggle Segmented Control -->
        <div class="view-toggle-container flex p-0.5 bg-canvas-deep border border-border rounded-md">
          <button id="btn-board-view" class="view-tab-btn active px-3.5 py-1.5 text-xs font-medium rounded-sm flex items-center space-x-1.5 transition-all" aria-label="보드로 전환">
            <i data-lucide="layout-grid" class="w-3.5 h-3.5 text-accent"></i>
            <span>보드</span>
          </button>
          <button id="btn-calendar-view" class="view-tab-btn px-3.5 py-1.5 text-xs font-medium rounded-sm flex items-center space-x-1.5 transition-all" aria-label="달력 뷰로 전환">
            <i data-lucide="calendar" class="w-3.5 h-3.5"></i>
            <span>달력 뷰</span>
          </button>
          <button id="btn-dashboard-view" class="view-tab-btn px-3.5 py-1.5 text-xs font-medium rounded-sm flex items-center space-x-1.5 transition-all" aria-label="대시보드로 전환">
            <i data-lucide="layout-dashboard" class="w-3.5 h-3.5"></i>
            <span>대시보드</span>
          </button>
        </div>

        <!-- Add Task Button -->
        <button id="btn-add-task" class="btn-primary px-4 py-2 text-xs font-medium rounded-md flex items-center space-x-1.5 transition-all" aria-label="새로운 할 일 추가">
          <i data-lucide="plus" class="w-3.5 height-3.5"></i>
          <span>새 할 일 추가</span>
        </button>

        <!-- Backup: Export / Import -->
        <button id="btn-export-data" class="px-3 py-2 text-xs font-medium rounded-md flex items-center space-x-1.5 border border-border bg-canvas-deep transition-all" aria-label="데이터 내보내기" title="현재 할 일을 백업 파일로 저장">
          <i data-lucide="download" class="w-3.5 h-3.5"></i>
          <span>내보내기</span>
        </button>
        <button id="btn-import-data" class="px-3 py-2 text-xs font-medium rounded-md flex items-center space-x-1.5 border border-border bg-canvas-deep transition-all" aria-label="데이터 불러오기" title="백업 파일에서 할 일 가져오기">
          <i data-lucide="upload" class="w-3.5 h-3.5"></i>
          <span>불러오기</span>
        </button>
        <button id="btn-migrate-sync" class="sync-migrate-btn" aria-label="동기화판으로 옮기기" title="이 브라우저의 할 일을 Google 동기화판으로 옮기기" hidden>
          <i data-lucide="send" class="w-3.5 h-3.5"></i>
          <span>동기화판으로 옮기기</span>
        </button>
        <button id="btn-sync-now" class="sync-status-pill" aria-label="동기화 새로고침" title="동기화 새로고침">
          <i id="sync-status-icon" data-lucide="hard-drive" class="w-3.5 h-3.5"></i>
          <span id="sync-status-text">이 브라우저</span>
        </button>
        <input id="import-file-input" type="file" accept="application/json,.json" class="hidden" style="display:none" />
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 bg-canvas p-6 md:p-12 overflow-x-hidden">
      <div id="app-content" class="h-full">
        <!-- Dynamic Content (Board or Calendar) will render here -->
      </div>
    </main>

    <!-- Vercel-Style Flat Footer -->
    <footer class="app-footer border-t border-border py-6 px-12 bg-canvas-soft flex items-center justify-between text-xs text-mute font-mono">
      <div>GRADUATE KANBAN BOARD &bull; MVP</div>
      <div>키보드 단축키 <kbd class="px-1.5 py-0.5 bg-canvas border border-border rounded font-sans text-[10px]">?</kbd> 누르기</div>
    </footer>
  </div>

  <!-- Modal Target Container -->
  <div id="modal-container" class="modal-root z-50"></div>

  <!-- App Core JavaScript -->
</body>
</html>
